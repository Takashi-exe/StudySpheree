{% extends "base.html" %}
{% load static %}

{% block title %}Welcome to StudySphere{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-lg-8 text-center">
            <h1 class="display-3 fw-bold mb-4">Welcome to StudySphere</h1>
            <p class="lead text-secondary mb-5">Your modern, collaborative learning platform.</p>
            <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg px-4 gap-3">Login</a>
                <a href="{% url 'accounts:register' %}" class="btn btn-outline-secondary btn-lg px-4">Register</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
